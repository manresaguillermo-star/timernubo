<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer de Envíos</title>
    <style>
        /* Reseteo básico para que el iframe no tenga bordes blancos */
        body {
            margin: 0;
            padding: 0;
            background-color: #141414; /* Mismo fondo que la web */
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Ocupa todo el alto del iframe */
            overflow: hidden; /* Evita barras de scroll */
        }

        .timer-container {
            text-align: center;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
        }

        .titulo {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .badge-hoy {
            text-shadow: 2px 0px 0px rgba(255,0,0,0.5), -2px 0px 0px rgba(0,255,255,0.5);
        }

        .subtitulo {
            font-size: 13px;
            margin-bottom: 20px;
            color: #e0e0e0;
            text-transform: uppercase;
        }

        .countdown-wrapper {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: flex-start;
        }

        .bloque-tiempo {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .digitos-container {
            display: flex;
            gap: 3px;
        }

        .digito {
            background-color: #4a90e2;
            color: #000;
            font-size: 32px;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 4px;
            min-width: 22px;
            text-align: center;
        }

        .etiqueta {
            color: #4a90e2;
            font-size: 12px;
            margin-top: 6px;
        }

        .separador {
            font-size: 28px;
            font-weight: bold;
            color: #4a90e2;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="timer-container">
        <div class="titulo">
            Envío en el dia 🚀 ➝ Recibilo <span id="nubo-day-badge" class="badge-hoy">HOY</span>
        </div>

        <div class="subtitulo">
            RECIBI TU PEDIDO ENTRE LAS <span id="nubo-time-window">00:00 y 00:00HS</span> DEL <span id="nubo-target-day">DIA</span> SI PEDIS ANTES DE:
        </div>
        
        <div class="countdown-wrapper">
            <div class="bloque-tiempo">
                <div class="digitos-container">
                    <span id="t-h-1" class="digito">0</span>
                    <span id="t-h-2" class="digito">0</span>
                </div>
                <span class="etiqueta">Horas</span>
            </div>

            <div class="separador">:</div>

            <div class="bloque-tiempo">
                <div class="digitos-container">
                    <span id="t-m-1" class="digito">0</span>
                    <span id="t-m-2" class="digito">0</span>
                </div>
                <span class="etiqueta">Minutos</span>
            </div>

            <div class="separador">:</div>

            <div class="bloque-tiempo">
                <div class="digitos-container">
                    <span id="t-s-1" class="digito">0</span>
                    <span id="t-s-2" class="digito">0</span>
                </div>
                <span class="etiqueta">Segundos</span>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            // CONFIGURACIÓN DE HORARIOS DE CORTE
            const horariosCorte = {
                0: 12.0, // Domingo
                1: 16.0, // Lunes
                2: 18.0, // Martes
                3: 16.0, // Miércoles
                4: 16.0, // Jueves
                5: 18.0, // Viernes
                6: 19.5  // Sábado (19:30hs)
            };

            const nombresDias = ["DOMINGO", "LUNES", "MARTES", "MIERCOLES", "JUEVES", "VIERNES", "SABADO"];

            function formatearHora(horaDecimal) {
                let h = Math.floor(horaDecimal);
                let m = Math.round((horaDecimal % 1) * 60);
                return String(h).padStart(2, '0') + ":" + String(m).padStart(2, '0');
            }

            function actualizarDigitos(idPrefix, valor) {
                let str = String(valor).padStart(2, '0');
                document.getElementById(idPrefix + '1').innerText = str[0];
                document.getElementById(idPrefix + '2').innerText = str[1];
            }

            function actualizarTimer() {
                const ahora = new Date();
                const diaActual = ahora.getDay();
                const horaActualDecimal = ahora.getHours() + (ahora.getMinutes() / 60);
                
                let targetDate = new Date();
                let esParaManana = false;
                let diaObjetivoIdx = diaActual;
                let horaCorteDecimal = horariosCorte[diaActual];

                if (horaActualDecimal >= horaCorteDecimal) {
                    esParaManana = true;
                    diaObjetivoIdx = (diaActual + 1) % 7;
                    horaCorteDecimal = horariosCorte[diaObjetivoIdx];
                    targetDate.setDate(targetDate.getDate() + 1);
                }

                let horasTarget = Math.floor(horaCorteDecimal);
                let minsTarget = Math.round((horaCorteDecimal % 1) * 60);
                targetDate.setHours(horasTarget, minsTarget, 0, 0);

                const diff = targetDate - ahora;

                if (diff > 0) {
                    const horas = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutos = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const segundos = Math.floor((diff % (1000 * 60)) / 1000);

                    actualizarDigitos('t-h-', horas);
                    actualizarDigitos('t-m-', minutos);
                    actualizarDigitos('t-s-', segundos);

                    document.getElementById('nubo-day-badge').innerText = esParaManana ? "MAÑANA" : "HOY";
                    document.getElementById('nubo-target-day').innerText = nombresDias[diaObjetivoIdx];
                    
                    let horaInicio = formatearHora(horaCorteDecimal);
                    let horaFin = formatearHora(horaCorteDecimal + 2);
                    document.getElementById('nubo-time-window').innerText = horaInicio + " y " + horaFin + "HS";
                }
            }

            actualizarTimer();
            setInterval(actualizarTimer, 1000);
        });
    </script>
</body>
</html>
